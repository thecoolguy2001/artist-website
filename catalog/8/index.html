  <script>
    const cdTooltip = document.getElementById('cd-tooltip'); // Tooltip for CD Image
    const logoTooltip = document.getElementById('logo-tooltip');
     // Raycaster and mouse vector for detecting mouse intersections
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
    // Wait for the DOM to be fully loaded
    window.addEventListener('load', function() {
       // === Spinning Logo Code ===

      // Create the scene for the logo
      const logoScene = new THREE.Scene();

      // Set up the camera for the logo
      const logoCamera = new THREE.PerspectiveCamera(80, 1, 0.1, 1000);
      logoCamera.position.z = 1;

      // Create the renderer for the logo
      const logoRenderer = new THREE.WebGLRenderer({ alpha: true });
      logoRenderer.setSize(100, 100);
      logoRenderer.setPixelRatio(window.devicePixelRatio);
      document.getElementById('logo-container').appendChild(logoRenderer.domElement);

      // Add lights to the logo scene
      const logoAmbientLight = new THREE.AmbientLight(0xffffff, 0.8); // Soft white light
      logoScene.add(logoAmbientLight);

      const logoDirectionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      logoDirectionalLight.position.set(5, 10, 7.5); // Adjust position as needed
      logoScene.add(logoDirectionalLight);

      // Variable to hold the logo model
      const logoRaycaster = new THREE.Raycaster();
    const logoMouse = new THREE.Vector2();
      let logoModel;

      // Load the logo model
      const logoLoader = new THREE.GLTFLoader();
      logoLoader.load(
        '/models/logo.v2.glb',
        function(gltf) {
        logoModel = gltf.scene;
        logoModel.traverse((child)=>{
          if(child.isMesh) {
            child.material.side = THREE.DoubleSide;
            child.material.needsUpdate = true;
          }
        });
        logoScene.add(logoModel);
      },
      undefined,
      function(error){
        console.error(error);
      }
    );
    logoRenderer.domElement.addEventListener('click', onLogoClickLogo, false);
    function onLogoClickLogo(event) {
      const rect = logoRenderer.domElement.getBoundingClientRect();
      logoMouse.x = ((event.clientX-rect.left)/rect.width)*2-1;
      logoMouse.y = -((event.clientY-rect.top)/rect.height)*2+1;

      logoRaycaster.setFromCamera(logoMouse,logoCamera);

      if(logoModel){
        const intersects = logoRaycaster.intersectObject(logoModel,true);
        if(intersects.length>0){
          window.location.href='/';
        }
      }
    }

    logoRenderer.domElement.addEventListener('mousemove',onLogoMouseMove,false);

    function onLogoMouseMove(event) {
  // Calculate mouse position in normalized device coordinates (-1 to +1) for both components

  (function() {
    var imgUrl  = '/models/painting_goodbye/textures/Material.002_baseColor.jpeg';
    var gltfUrl = '/models/painting_goodbye/scene.gltf';

    // ---- 2D view ----
    var modal = document.getElementById('painting-modal-2d');
    var modalImg = document.getElementById('painting-modal-img');
    var modalClose = modal.querySelector('.painting-modal__close');
    modalImg.src = imgUrl;
    function openModal() { modal.classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closeModal() { modal.classList.remove('open'); document.body.style.overflow = ''; }
    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (modal.classList.contains('open')) closeModal();
        closeAR();
      }
    });
    document.querySelectorAll('[data-action="view-2d"]').forEach(function(btn) {
      btn.addEventListener('click', openModal);
    });

    // ---- AR view (lazy-loads <model-viewer>) ----
    var arViewer = null;
    var arClose = document.getElementById('painting-ar-close');
    var mvLoadPromise = null;
    function ensureModelViewer() {
      if (window.customElements && window.customElements.get('model-viewer')) {
        return Promise.resolve();
      }
      if (mvLoadPromise) return mvLoadPromise;
      mvLoadPromise = new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.type = 'module';
        s.src = 'https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js';
        s.onload = function() { customElements.whenDefined('model-viewer').then(resolve); };
        s.onerror = reject;
        document.head.appendChild(s);
      });
      return mvLoadPromise;
    }
    function getOrCreateViewer() {
      if (arViewer) return arViewer;
      arViewer = document.createElement('model-viewer');
      arViewer.id = 'painting-ar';
      arViewer.className = 'painting-ar';
      arViewer.setAttribute('ar', '');
      arViewer.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
      arViewer.setAttribute('ar-placement', 'wall');
      arViewer.setAttribute('camera-controls', '');
      arViewer.setAttribute('touch-action', 'pan-y');
      arViewer.setAttribute('alt', '');
      // Single-file GLB drives Android Scene Viewer + the desktop 3D fallback;
      // ios-src (USDZ) drives iOS Quick Look. USDZ files are generated separately.
      arViewer.setAttribute('ios-src', gltfUrl.replace('scene.gltf', 'scene.usdz'));
      arViewer.src = gltfUrl.replace('scene.gltf', 'scene.glb');
      document.body.appendChild(arViewer);
      return arViewer;
    }
    function closeAR() {
      if (!arViewer) return;
      arViewer.classList.remove('open');
      arClose.classList.remove('open');
      document.body.style.overflow = '';
    }
    arClose.addEventListener('click', closeAR);
    function viewInAR() {
      ensureModelViewer().then(function() {
        var mv = getOrCreateViewer();
        function tryActivate() {
          if (mv.canActivateAR) {
            mv.activateAR();
          } else {
            // No AR available — show interactive 3D viewer as fallback.
            mv.classList.add('open');
            arClose.classList.add('open');
            document.body.style.overflow = 'hidden';
          }
        }
        if (mv.loaded) tryActivate();
        else mv.addEventListener('load', tryActivate, { once: true });
      }).catch(function(err) {
        console.error('AR loading failed:', err);
        alert('AR view is not available right now.');
      });
    }
    document.querySelectorAll('[data-action="view-ar"]').forEach(function(btn) {
      btn.addEventListener('click', viewInAR);
    });
  })();
  </script>
