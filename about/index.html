  <!-- JavaScript Code -->
  <script>
    window.addEventListener('load', function() {
      // === Spinning Logo Code ===

      // Create the scene for the logo
      const logoScene = new THREE.Scene();

      // Set up the camera for the logo
      const logoCamera = new THREE.PerspectiveCamera(80, 1, 0.1, 1000);
      logoCamera.position.z = 1;

      // Create the renderer for the logo
      const logoRenderer = new THREE.WebGLRenderer({ alpha: true });
      logoRenderer.setSize(100, 100);
      logoRenderer.setPixelRatio(window.devicePixelRatio);
      document.getElementById('logo-container').appendChild(logoRenderer.domElement);

      // Add lights to the logo scene
      const logoAmbientLight = new THREE.AmbientLight(0xffffff, 0.8); // Soft white light
      logoScene.add(logoAmbientLight);

      const logoDirectionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      logoDirectionalLight.position.set(5, 10, 7.5); // Adjust position as needed
      logoScene.add(logoDirectionalLight);

      // Variable to hold the logo model
      const logoRaycaster = new THREE.Raycaster();
      const logoMouse = new THREE.Vector2();
      let logoModel;

      // Load the logo model
      const logoLoader = new THREE.GLTFLoader();
      logoLoader.load(
        '/models/logo.v2.glb',
        function(gltf) {
          logoModel = gltf.scene;
          logoModel.traverse((child) => {
            if(child.isMesh) {
              child.material.side = THREE.DoubleSide;
              child.material.needsUpdate = true;
            }
          });
          logoScene.add(logoModel);
        },
        undefined,
        function(error){
          console.error('Error loading logo model:', error);
        }
      );

      // Event listener for logo click
      logoRenderer.domElement.addEventListener('click', onLogoClickLogo, false);
      function onLogoClickLogo(event) {
        const rect = logoRenderer.domElement.getBoundingClientRect();
        logoMouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        logoMouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        logoRaycaster.setFromCamera(logoMouse, logoCamera);

        if(logoModel){
          const intersects = logoRaycaster.intersectObject(logoModel, true);
          if(intersects.length > 0){
            window.location.href = '/';
          }
        }
      }

      // Event listener for logo mouse move
      logoRenderer.domElement.addEventListener('mousemove', onLogoMouseMove, false);

      function onLogoMouseMove(event) {
        // Calculate mouse position in normalized device coordinates (-1 to +1)
        const rect = logoRenderer.domElement.getBoundingClientRect();
        logoMouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        logoMouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        // Update the picking ray with the camera and mouse position
        logoRaycaster.setFromCamera(logoMouse, logoCamera);

        // Calculate objects intersecting the picking ray
        let intersects = [];
        if (logoModel) {
          intersects = logoRaycaster.intersectObject(logoModel, true);
        }

        if (intersects.length > 0) {
          logoRenderer.domElement.style.cursor = 'pointer';
          showTooltip(event.clientX, event.clientY, 'Home');
        } else {
          logoRenderer.domElement.style.cursor = 'default';
          hideTooltip();
        }
      }

      function showTooltip(x, y, text) {
        const tooltip = document.getElementById('logo-tooltip');
        tooltip.textContent = text;
        tooltip.style.left = (x + 10) + 'px'; // 10px offset to the right
        tooltip.style.top = (y) + 'px'; // Align vertically with the cursor
        tooltip.style.opacity = '1';
      }

      function hideTooltip() {
        const tooltip = document.getElementById('logo-tooltip');
        tooltip.style.opacity = '0';
      }

      // Animation loop for the logo
      function animateLogo() {
        requestAnimationFrame(animateLogo);

        // Rotate the model
        if (logoModel) {
          logoModel.rotation.y += 0.01;
        }

        logoRenderer.render(logoScene, logoCamera);
      }

      animateLogo();

      // === Existing 3D Model Code ===

      // Create a Three.JS Scene
      const scene = new THREE.Scene();
      scene.background = null; // Transparent background

      // Get the container and set the camera
      const container = document.getElementById("container3D");
      const width = container.clientWidth || window.innerWidth * 0.5;
      const height = container.clientHeight || window.innerHeight;

      const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);

      // Set the camera position
      camera.position.set(0, 0, 5);

      // Instantiate the renderer
      const renderer = new THREE.WebGLRenderer({ alpha: true });
      renderer.setSize(width, height);
      renderer.setPixelRatio(window.devicePixelRatio);

      // Append the renderer to the DOM
      container.appendChild(renderer.domElement);

      // Add OrbitControls
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; // Optional: add smoothness to controls
      controls.dampingFactor = 0.05;

      // Add lights to the scene
      const topLight = new THREE.DirectionalLight(0xffffff, 2);
      topLight.position.set(500, 500, 500);
      scene.add(topLight);

      const ambientLight = new THREE.AmbientLight(0xffffff, 1);
      scene.add(ambientLight);

      // Instantiate a loader for the .gltf file
      const loader = new THREE.GLTFLoader();

      // Many small copies of the statue floating through 3D depth + space.
      let meshes = [];            // all clone meshes (for hover cursor)
      const floaters = [];        // per-instance drift state
      const STATUE_COUNT = 9;
      let groupFadeAlpha = 0;

      // Pull the camera back so the floating field has room.
      camera.position.set(0, 0, 7);

      loader.load(
        '/models/Heavenly_Guardians_1213052528_generate.glb',
        function (gltf) {
          const template = gltf.scene;

          // Normalise the template so copies scale predictably.
          const box = new THREE.Box3().setFromObject(template);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const unit = 1.6 / maxDim;   // base height ~1.6 units

          for (let i = 0; i < STATUE_COUNT; i++) {
            const clone = template.clone(true);

            // Independent, fade-able materials per copy.
            clone.traverse(function (child) {
              if (child.isMesh && child.material) {
                child.material = child.material.clone();
                child.material.transparent = true;
                child.material.opacity = 0;
                meshes.push(child);
              }
            });

            // Recentre on its own origin, wrap so we can scale + place freely.
            clone.position.sub(center);
            const wrapper = new THREE.Group();
            wrapper.add(clone);
            wrapper.scale.setScalar(unit * (0.45 + Math.random() * 0.5));

            // Scatter through width, height and depth.
            const base = new THREE.Vector3(
              (Math.random() - 0.5) * 7,
              (Math.random() - 0.5) * 4.5,
              (Math.random() - 0.5) * 6 - 1
            );
            wrapper.position.copy(base);
            wrapper.rotation.set(Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2);
            wrapper.userData.isFloater = true;
            scene.add(wrapper);

            floaters.push({
              obj: wrapper,
              vel: new THREE.Vector3((Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02),
              spin: new THREE.Vector3((Math.random() - 0.5) * 0.01, (Math.random() - 0.5) * 0.012, (Math.random() - 0.5) * 0.008),
              spd: new THREE.Vector3(0.25 + Math.random() * 0.4, 0.3 + Math.random() * 0.4, 0.2 + Math.random() * 0.35),
              phase: new THREE.Vector3(Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28)
            });
          }
          console.log('Floating statues loaded:', floaters.length);
        },
        undefined,
        function (error) {
          console.error('Error loading model:', error);
        }
      );

      // Soft bounds — statues bounce gently off invisible walls so a throw
      // sends them ricocheting around the space instead of flying away.
      const BOUND = new THREE.Vector3(5.5, 3.2, 4);
      const BOUND_Z = -1.5;   // centre of the depth box

      let floatTime = 0;
      function animate() {
        requestAnimationFrame(animate);
        controls.update();

        floatTime += 0.016;

        // Fade the whole field in (snappier, matching the rest of the site).
        if (meshes.length && groupFadeAlpha < 1) {
          groupFadeAlpha = Math.min(1, groupFadeAlpha + 0.06);
          meshes.forEach(function (m) { m.material.opacity = groupFadeAlpha; });
        }

        floaters.forEach(function (f) {
          if (f === dragging) return;            // grabbed one follows the cursor

          // gentle perpetual drift so nothing ever sits perfectly still
          f.vel.x += Math.sin(floatTime * f.spd.x + f.phase.x) * 0.0006;
          f.vel.y += Math.sin(floatTime * f.spd.y + f.phase.y) * 0.0006;
          f.vel.z += Math.sin(floatTime * f.spd.z + f.phase.z) * 0.0006;

          f.obj.position.add(f.vel);
          f.vel.multiplyScalar(0.985);            // friction settles thrown ones

          ['x', 'y', 'z'].forEach(function (axis) {
            var c = axis === 'z' ? BOUND_Z : 0;
            var lim = BOUND[axis];
            if (f.obj.position[axis] > c + lim) { f.obj.position[axis] = c + lim; f.vel[axis] *= -0.6; }
            else if (f.obj.position[axis] < c - lim) { f.obj.position[axis] = c - lim; f.vel[axis] *= -0.6; }
          });

          f.obj.rotation.x += f.spin.x;
          f.obj.rotation.y += f.spin.y;
          f.obj.rotation.z += f.spin.z;
        });

        renderer.render(scene, camera);
      }

      // ---- Grab + throw a statue with the mouse -----------------------------
      const dragRay = new THREE.Raycaster();
      const dragNDC = new THREE.Vector2();
      const dragPlane = new THREE.Plane();
      const dragOffset = new THREE.Vector3();
      const dragHit = new THREE.Vector3();
      const camDir = new THREE.Vector3();
      let dragging = null;

      function ndcFromEvent(e) {
        const r = renderer.domElement.getBoundingClientRect();
        dragNDC.x = ((e.clientX - r.left) / r.width) * 2 - 1;
        dragNDC.y = -((e.clientY - r.top) / r.height) * 2 + 1;
      }

      // Capture phase: grab the statue and stop OrbitControls before it rotates.
      renderer.domElement.addEventListener('pointerdown', function (e) {
        ndcFromEvent(e);
        dragRay.setFromCamera(dragNDC, camera);
        const hits = dragRay.intersectObjects(meshes, true);
        if (!hits.length) return;
        let o = hits[0].object;
        while (o.parent && !o.userData.isFloater) o = o.parent;
        const f = floaters.find(function (ff) { return ff.obj === o; });
        if (!f) return;
        dragging = f;
        controls.enabled = false;
        renderer.domElement.style.cursor = 'grabbing';
        camera.getWorldDirection(camDir);
        dragPlane.setFromNormalAndCoplanarPoint(camDir, f.obj.position);
        dragOffset.set(0, 0, 0);
        if (dragRay.ray.intersectPlane(dragPlane, dragHit)) dragOffset.copy(f.obj.position).sub(dragHit);
        f.vel.set(0, 0, 0);
        try { renderer.domElement.setPointerCapture(e.pointerId); } catch (err) {}
      }, true);

      renderer.domElement.addEventListener('pointermove', function (e) {
        if (!dragging) return;
        ndcFromEvent(e);
        dragRay.setFromCamera(dragNDC, camera);
        if (dragRay.ray.intersectPlane(dragPlane, dragHit)) {
          const target = dragHit.add(dragOffset);
          dragging.vel.copy(target).sub(dragging.obj.position);  // throw velocity
          dragging.obj.position.copy(target);
        }
      });

      function endDrag() {
        if (!dragging) return;
        if (dragging.vel.length() > 0.6) dragging.vel.setLength(0.6);  // cap the fling
        dragging = null;
        controls.enabled = true;
        renderer.domElement.style.cursor = 'default';
      }
      window.addEventListener('pointerup', endDrag);
      window.addEventListener('pointercancel', endDrag);

      // Add event listener for mouse movement over the renderer's DOM element
      renderer.domElement.addEventListener('mousemove', onMouseMove, false);

      // Change cursor to 'grabbing' when the user is interacting with OrbitControls
      controls.addEventListener('start', function () {
        renderer.domElement.style.cursor = 'grabbing';
      });

      controls.addEventListener('end', function () {
        renderer.domElement.style.cursor = 'grab';
      });

      function onMouseMove(event) {
        // Calculate mouse position in normalized device coordinates (-1 to +1) for both components
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        // Update the picking ray with the camera and mouse position
        raycaster.setFromCamera(mouse, camera);

        // Calculate objects intersecting the picking ray
        const intersects = raycaster.intersectObjects(meshes, true);

        if (intersects.length > 0) {
          renderer.domElement.style.cursor = 'grab';
        } else {
          renderer.domElement.style.cursor = 'default';
        }
      }

      (function() {
  // Define the playlist array with your audio file paths
  const playlist = [
    '/music/song1.mp3',
    '/music/song2.mp3',
    '/music/song3.mp3'
    // Add more songs as needed
  ];

  // Initialize the current track index
  let currentTrackIndex = 0;

  // Create the Audio object without setting the source initially
  const radioAudio = new Audio();
  radioAudio.src = playlist[currentTrackIndex];
  radioAudio.loop = false; // No looping individual tracks
  radioAudio.autoplay = false; // User interaction required to play

  // Event listener for when a track ends
radioAudio.addEventListener('ended', function() {
  // Select a random track index
  let nextTrackIndex = Math.floor(Math.random() * playlist.length);
  
  // Optional: Prevent the same track from playing consecutively
  if (playlist.length > 1) { // Ensure there are at least two tracks
    while (nextTrackIndex === currentTrackIndex) {
      nextTrackIndex = Math.floor(Math.random() * playlist.length);
    }
  }
  
  currentTrackIndex = nextTrackIndex; // Update the current track index
  radioAudio.src = playlist[currentTrackIndex];
  radioAudio.play().catch(err => {
    console.error('Error playing next track:', err);
  });
});

  // Get the CD image and tooltip elements
  const cdImage = document.getElementById('bottom-right-image');
  const cdTooltip = document.getElementById('cd-tooltip');

  if (!cdImage || !cdTooltip) {
    console.error('CD image or tooltip element not found.');
    return;
  }

  // Function to toggle radio (playlist) playback
  function toggleRadio() {
    if (radioAudio.paused) {
      radioAudio.play().then(() => {
        cdImage.src = '/assets/cd.gif'; // Spinning CD animation
        cdImage.alt = 'Radio On';
        cdTooltip.textContent = 'Radio On';
        cdImage.classList.add('active'); // Add the 'active' class
      }).catch(err => {
        console.error('Playlist play error:', err);
      });
    } else {
      radioAudio.pause();
      cdImage.src = '/assets/cd.png';
      cdImage.alt = 'Radio Off';
      cdTooltip.textContent = 'Radio Off';
      cdImage.classList.remove('active'); // Remove the 'active' class
    }
  }

  // Attach click event listener to the CD image
  cdImage.addEventListener('click', toggleRadio);

  // Tooltip functionality remains unchanged
  cdImage.addEventListener('mouseenter', function(event) {
    cdTooltip.textContent = radioAudio.paused ? 'Radio Off' : 'Radio On';
    cdTooltip.style.opacity = '1';
    positionTooltip(event, cdTooltip);
  });

  cdImage.addEventListener('mousemove', function(event) {
    if (cdTooltip.style.opacity === '1') {
      positionTooltip(event, cdTooltip);
    }
  });

  cdImage.addEventListener('mouseleave', function() {
    cdTooltip.style.opacity = '0';
  });

  // Function to position the tooltip near the cursor
  function positionTooltip(event, tooltip) {
    const tooltipWidth = tooltip.offsetWidth;
    const tooltipHeight = tooltip.offsetHeight;
    const pageWidth = window.innerWidth;
    const pageHeight = window.innerHeight;

    let tooltipX = event.clientX + 10; // 10px to the right
    let tooltipY = event.clientY - tooltipHeight - 10; // 10px above

    // Adjust if tooltip goes beyond the right edge
    if (tooltipX + tooltipWidth > pageWidth) {
      tooltipX = event.clientX - tooltipWidth - 10;
    }

    // Adjust if tooltip goes above the top edge
    if (tooltipY < 0) {
      tooltipY = event.clientY + 10;
    }

    tooltip.style.left = `${tooltipX}px`;
    tooltip.style.top = `${tooltipY}px`;
  }
})();

      // === Handle Window Resizing ===
      window.addEventListener("resize", function () {
        const width = container.clientWidth || window.innerWidth * 0.5;
        const height = container.clientHeight || window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      });

      // Start rendering the 3D model
      animate();
    });

    document.addEventListener('DOMContentLoaded', function() {

      const bottomLeftImage = document.getElementById('bottom-left-image');

      if (!bottomLeftImage || !cvTooltip) {
        console.error('Bottom left image or CV tooltip not found.');

      bottomLeftImage.addEventListener('mouseenter', showTooltipCV);
      bottomLeftImage.addEventListener('mousemove', moveTooltipCV);
      bottomLeftImage.addEventListener('mouseleave', hideTooltipCV);
      bottomLeftImage.addEventListener('click', openCVInNewTab);

      // Function to show the tooltip when hovering over the CV image
      function showTooltipCV(event) {
        cvTooltip.textContent = 'View CV';
        cvTooltip.style.opacity = '1'; // Show the tooltip
        positionTooltipCV(event);
      }

      // Function to update the tooltip position as the mouse moves
      function moveTooltipCV(event) {
        if (cvTooltip.style.opacity === '1') {
          positionTooltipCV(event);
        }
      }

      // Function to position the tooltip near the cursor
      function positionTooltipCV(event) {
        const tooltipWidth = cvTooltip.offsetWidth;
        const tooltipHeight = cvTooltip.offsetHeight;
        const pageWidth = window.innerWidth;
        const pageHeight = window.innerHeight;

        let tooltipX = event.clientX + 10; // 10px to the right of the cursor
        let tooltipY = event.clientY - tooltipHeight - 10; // 10px above the cursor

        // Prevent tooltip from going off the right edge
        if (tooltipX + tooltipWidth > pageWidth) {
          tooltipX = event.clientX - tooltipWidth - 10;
        }

        // Prevent tooltip from going above the top edge
        if (tooltipY < 0) {
          tooltipY = event.clientY + 10;
        }

        cvTooltip.style.left = `${tooltipX}px`;
        cvTooltip.style.top = `${tooltipY}px`;
      }

      // Function to hide the tooltip when not hovering
      function hideTooltipCV() {
        cvTooltip.style.opacity = '0'; // Hide the tooltip
      }

      // Function to open the CV PDF in a new tab when the image is clicked
      function openCVInNewTab() {
        window.open('/assets/cv.pdf', '_blank'); // Ensure 'cv.pdf' is correctly placed in your server
      }
    });
  </script>
